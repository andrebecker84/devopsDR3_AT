# =============================================================================
# secret-demo.yml — Parte 3, Item 2
# Disciplina: DevOps (DR3) — Assessment Final (AT)
# Aluno: Andre Luis Becker — Instituto Infnet — 2026
#
# Trigger: qualquer push
# Funcao: demonstra uso seguro de secrets no GitHub Actions
#
# Pre-requisito: configurar o secret API_KEY em:
#   GitHub > Settings > Secrets and variables > Actions > New repository secret
#   Name: API_KEY  |  Value: <valor-do-token>
#
# O GitHub mascara automaticamente o valor real do secret nos logs (exibe ***)
# Este workflow verifica apenas a PRESENCA do secret, nunca exibe seu conteudo
# =============================================================================

name: Secret Demo

on:
  push:

jobs:
  secret:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar presenca do secret API_KEY
        # O valor de secrets.API_KEY nunca aparece no log
        # O GitHub substitui automaticamente qualquer ocorrencia por ***
        run: |
          if [ -n "${{ secrets.API_KEY }}" ]; then
            echo "API_KEY configurado"
          else
            echo "::warning::API_KEY nao encontrado — configure o secret no repositorio GitHub"
            echo "Caminho: Settings > Secrets and variables > Actions > New repository secret"
          fi

      - name: Demonstrar uso do GITHUB_TOKEN
        # GITHUB_TOKEN e gerado automaticamente pelo GitHub para cada execucao
        # Permite autenticacao na API do GitHub sem configurar token pessoal
        # Permissoes limitadas ao repositorio em execucao
        run: |
          echo "GITHUB_TOKEN disponivel: ${{ secrets.GITHUB_TOKEN != '' }}"
          echo "Repositorio: ${{ github.repository }}"
          echo "Executor: ${{ github.actor }}"
